name: Build LSP ML Stores

on:
  push:
    branches:
      - main
    tags:
      - 'lsp-stores-*'
    paths:
      - 'prove-py/src/prove/stdlib/**/*.prv'
      - 'examples/**/*.prv'
      - 'proof/**/*.prv'
      - 'benchmarks/**/*.prv'
      - 'prove-py/tests/fixtures/**/*.prv'
      - 'scripts/ml_extract.py'
      - 'scripts/ml_train.py'
      - 'scripts/ml_store.py'
      - 'prove-py/scripts/build_stores.py'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: prove-py
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install prove-py dependencies
        run: pip install -e ".[dev]" -q --break-system-packages

      - name: Extract ML data
        run: python ../scripts/ml_extract.py

      - name: Train ML models
        run: python ../scripts/ml_train.py

      - name: Build stores
        run: |
          python scripts/build_stores.py --package-only
          mkdir -p ../build/lsp-ml-stores
          cp -r src/prove/data/lsp ../build/lsp-ml-stores/

      - name: Create tarball
        run: tar -czf lsp-ml-stores.tar.gz -C .. lsp-ml-stores/

      - name: Create or update release
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="lsp-stores-v$(date +'%Y.%m.%d')"
          fi

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GITEA_TOKEN" \
            -H "Content-Type: application/json" \
            "${{ gitea.server_url }}/api/v1/repos/${{ gitea.repository }}/releases" \
            -d "{
              \"tag_name\": \"$TAG\",
              \"name\": \"LSP ML Stores ${TAG#lsp-stores-v}\",
              \"body\": \"Pre-trained LSP completion stores. Extract to prove/data/ or run \`prove setup\` to download.\"
            }" || true)

          RELEASE_ID=$(echo "$RESPONSE" | grep -o '"id":[0-9]*' | head -1 | grep -o '[0-9]*' || echo "")

          if [ -n "$RELEASE_ID" ]; then
            curl -s -X POST \
              -H "Authorization: token $GITEA_TOKEN" \
              -F "attachment=@lsp-ml-stores.tar.gz" \
              "${{ gitea.server_url }}/api/v1/repos/${{ gitea.repository }}/releases/$RELEASE_ID/attachments"
          fi
