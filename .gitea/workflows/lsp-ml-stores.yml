name: Build LSP ML Stores

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: prove-py
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create venv and install
        run: |
          python3 -m venv ../.venv
          source ../.venv/bin/activate
          pip install -e ".[dev,nlp]" -q
          python -m spacy download en_core_web_lg -q
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Extract ML data
        run: python ../scripts/ml_extract.py

      - name: Train ML models
        run: python ../scripts/ml_train.py

      - name: Build stores and tarball
        run: |
          python scripts/build_stores.py
          cp ../build/lsp-ml-stores.tar.gz ./lsp-ml-stores.tar.gz

      - name: Upload to release
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          API="${{ gitea.server_url }}/api/v1/repos/${{ gitea.repository }}"

          # Fetch existing release (created by release.yml) or create one
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token $GITEA_TOKEN" \
            "$API/releases/tags/$TAG" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])") \
          || {
            CREATE=$(curl -sf -X POST \
              -H "Authorization: token $GITEA_TOKEN" \
              -H "Content-Type: application/json" \
              "$API/releases" \
              -d "{
                \"tag_name\": \"$TAG\",
                \"name\": \"Prove ${TAG#v}\",
                \"body\": \"Release ${TAG#v}\"
              }")
            RELEASE_ID=$(echo "$CREATE" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          }

          if [ -z "$RELEASE_ID" ]; then
            echo "ERROR: could not get release ID for tag $TAG" >&2
            exit 1
          fi
          echo "Release ID: $RELEASE_ID"

          # Delete existing attachment with the same name (idempotent re-runs)
          EXISTING_ASSET_ID=$(curl -sf \
            -H "Authorization: token $GITEA_TOKEN" \
            "$API/releases/$RELEASE_ID/assets" \
            | python3 -c "
          import sys,json
          assets = json.load(sys.stdin)
          match = next((a['id'] for a in assets if a['name'] == 'lsp-ml-stores.tar.gz'), None)
          print(match or '')
          ")
          if [ -n "$EXISTING_ASSET_ID" ]; then
            curl -sf -X DELETE \
              -H "Authorization: token $GITEA_TOKEN" \
              "$API/releases/$RELEASE_ID/assets/$EXISTING_ASSET_ID"
            echo "Deleted old asset $EXISTING_ASSET_ID"
          fi

          # Upload the new tarball
          curl -f -X POST \
            -H "Authorization: token $GITEA_TOKEN" \
            -F "attachment=@lsp-ml-stores.tar.gz" \
            "$API/releases/$RELEASE_ID/assets"
          echo "Asset uploaded."
