name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-runner
            platform: macos-aarch64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    defaults:
      run:
        working-directory: prove-py
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        if: matrix.os == 'ubuntu-latest'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libsdl2-dev libgl-dev
          git clone --depth 1 --branch v0.25.4 https://github.com/tree-sitter/tree-sitter.git /tmp/tree-sitter
          cd /tmp/tree-sitter
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Create venv and install
        run: |
          python3 -m venv ../.venv
          source ../.venv/bin/activate
          pip install -e ".[dev]" -q
          pip install ../tree-sitter-prove -q
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Bootstrap NLP stores from bundled data
        working-directory: prove-py
        run: |
          mkdir -p ~/.prove
          cp src/prove/data/verb_synonyms.dat ~/.prove/

      - name: Build proof binary
        run: |
          python -c "
          import traceback, sys
          try:
              from prove.builder import build_project
              from prove.config import load_config
              from pathlib import Path
              p = Path('../proof')
              result = build_project(p, load_config(p / 'prove.toml'))
              print(f'Build result: {result}')
          except Exception as e:
              traceback.print_exc()
              sys.exit(1)
          "
          ls -la ../proof/dist/proof || { echo "ERROR: proof binary not found after build"; exit 1; }

      - name: Run all checks
        run: |
          ruff check src/ tests/ &
          RUFF_PID=$!
          mypy src/ &
          MYPY_PID=$!
          python -m pytest tests/ -v --tb=short -n auto &
          PYTEST_PID=$!
          python ../scripts/test_e2e.py &
          E2E_PID=$!
          FAIL=0
          wait $RUFF_PID   || { echo "ruff failed";   FAIL=1; }
          wait $MYPY_PID   || { echo "mypy failed";   FAIL=1; }
          wait $PYTEST_PID || { echo "pytest failed";  FAIL=1; }
          wait $E2E_PID    || { echo "e2e failed";     FAIL=1; }
          exit $FAIL

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          # Extract section for this version (between its header and the next --- or EOF)
          awk "/^## v${VERSION//./\\.} /{found=1; next} /^---$/{if(found) exit} found" \
            ../CHANGELOG.md > ../release-notes.md

          if [ ! -s ../release-notes.md ]; then
            echo "WARNING: no CHANGELOG.md entry found for ${TAG}, falling back to commit log" >&2
            PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)
            git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s" --no-merges > ../release-notes.md
          fi

          # Append install instructions
          {
            echo ""
            echo "---"
            echo ""
            echo "**Install:**"
            echo '```sh'
            echo "curl -sSf https://code.botwork.se/Botwork/prove/raw/branch/main/scripts/install.sh | sh"
            echo '```'
          } >> ../release-notes.md

      - name: Package and upload binary
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          TARBALL="proof-${TAG}-${{ matrix.platform }}.tar.gz"
          API="${{ gitea.server_url }}/api/v1/repos/${{ gitea.repository }}"

          tar -czf "$TARBALL" -C ../proof/dist proof

          BODY=$(cat ../release-notes.md)

          # Create or fetch release
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token $GITEA_TOKEN" \
            "$API/releases/tags/$TAG" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])") \
          || {
            CREATE=$(curl -sf -X POST \
              -H "Authorization: token $GITEA_TOKEN" \
              -H "Content-Type: application/json" \
              "$API/releases" \
              -d "$(python3 -c "
          import json, sys
          body = open('../release-notes.md').read()
          print(json.dumps({
              'tag_name': '$TAG',
              'name': 'Prove $VERSION',
              'body': body
          }))
          ")")
            RELEASE_ID=$(echo "$CREATE" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          }

          # Always update the release body and name (handles pre-existing releases)
          curl -sf -X PATCH \
            -H "Authorization: token $GITEA_TOKEN" \
            -H "Content-Type: application/json" \
            "$API/releases/$RELEASE_ID" \
            -d "$(python3 -c "
          import json
          body = open('../release-notes.md').read()
          print(json.dumps({
              'name': 'Prove $VERSION',
              'body': body
          }))
          ")"

          if [ -z "$RELEASE_ID" ]; then
            echo "ERROR: could not get release ID for tag $TAG" >&2
            exit 1
          fi

          # Delete existing asset with same name (idempotent re-runs)
          EXISTING=$(curl -sf \
            -H "Authorization: token $GITEA_TOKEN" \
            "$API/releases/$RELEASE_ID/assets" \
            | python3 -c "
          import sys,json
          assets = json.load(sys.stdin)
          match = next((a['id'] for a in assets if a['name'] == '$TARBALL'), None)
          print(match or '')
          ")
          if [ -n "$EXISTING" ]; then
            curl -sf -X DELETE \
              -H "Authorization: token $GITEA_TOKEN" \
              "$API/releases/$RELEASE_ID/assets/$EXISTING"
          fi

          curl -f -X POST \
            -H "Authorization: token $GITEA_TOKEN" \
            -F "attachment=@$TARBALL" \
            "$API/releases/$RELEASE_ID/assets"
          echo "Uploaded: $TARBALL"

  wheel:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build and upload wheel
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install build -q
          python -m build prove-py/ --wheel --outdir dist/

          TAG="${GITHUB_REF#refs/tags/}"
          API="${{ gitea.server_url }}/api/v1/repos/${{ gitea.repository }}"
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token $GITEA_TOKEN" \
            "$API/releases/tags/$TAG" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          for WHEEL in dist/*.whl; do
            NAME=$(basename "$WHEEL")
            EXISTING=$(curl -sf \
              -H "Authorization: token $GITEA_TOKEN" \
              "$API/releases/$RELEASE_ID/assets" \
              | python3 -c "
          import sys,json
          assets = json.load(sys.stdin)
          match = next((a['id'] for a in assets if a['name'] == '$NAME'), None)
          print(match or '')
          ")
            if [ -n "$EXISTING" ]; then
              curl -sf -X DELETE \
                -H "Authorization: token $GITEA_TOKEN" \
                "$API/releases/$RELEASE_ID/assets/$EXISTING"
            fi
            curl -f -X POST \
              -H "Authorization: token $GITEA_TOKEN" \
              -F "attachment=@$WHEEL" \
              "$API/releases/$RELEASE_ID/assets"
            echo "Uploaded: $NAME"
          done
