name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          # Uncomment when self-hosted macOS runner is registered:
          # - os: self-hosted-macos-arm64
          #   platform: macos-aarch64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: prove-py
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: prove-py/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]" -q --break-system-packages

      - name: Run full test suite
        run: |
          python -m pytest tests/ -v --tb=short
          ruff check src/ tests/
          mypy src/

      - name: Run e2e tests
        run: python ../scripts/test_e2e.py

      - name: Build proof project
        run: prove build ../proof/

      - name: Package binary
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TARBALL="proof-${TAG}-${{ matrix.platform }}.tar.gz"
          tar -czf "$TARBALL" -C ../proof/dist proof
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proof-${{ matrix.platform }}
          path: prove-py/${{ env.TARBALL }}
          retention-days: 5

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build Python wheel
        run: |
          pip install build -q --break-system-packages
          python -m build prove-py/ --wheel --outdir artifacts/wheel

      - name: Create release and upload assets
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          API="${{ gitea.server_url }}/api/v1/repos/${{ gitea.repository }}"

          # Create or fetch release
          CREATE=$(curl -sf -X POST \
            -H "Authorization: token $GITEA_TOKEN" \
            -H "Content-Type: application/json" \
            "$API/releases" \
            -d "{
              \"tag_name\": \"$TAG\",
              \"name\": \"Prove $VERSION\",
              \"body\": \"Release $VERSION\n\nInstall: \`curl -sSf https://code.botwork.se/Botwork/prove/raw/branch/main/scripts/install.sh | sh\`\"
            }") && RELEASE_ID=$(echo "$CREATE" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])") \
          || RELEASE_ID=$(curl -sf \
            -H "Authorization: token $GITEA_TOKEN" \
            "$API/releases/tags/$TAG" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          if [ -z "$RELEASE_ID" ]; then
            echo "ERROR: could not get release ID for tag $TAG" >&2
            exit 1
          fi
          echo "Release ID: $RELEASE_ID"

          # Upload helper: delete existing asset then upload new one
          upload_asset() {
            local FILE="$1"
            local NAME
            NAME=$(basename "$FILE")

            # Delete existing asset with same name (idempotent re-runs)
            EXISTING_ASSET_ID=$(curl -sf \
              -H "Authorization: token $GITEA_TOKEN" \
              "$API/releases/$RELEASE_ID/assets" \
              | python3 -c "
          import sys,json
          assets = json.load(sys.stdin)
          match = next((a['id'] for a in assets if a['name'] == '$NAME'), None)
          print(match or '')
          ")
            if [ -n "$EXISTING_ASSET_ID" ]; then
              curl -sf -X DELETE \
                -H "Authorization: token $GITEA_TOKEN" \
                "$API/releases/$RELEASE_ID/assets/$EXISTING_ASSET_ID"
              echo "Deleted old asset $EXISTING_ASSET_ID"
            fi

            curl -f -X POST \
              -H "Authorization: token $GITEA_TOKEN" \
              -F "attachment=@$FILE" \
              "$API/releases/$RELEASE_ID/assets"
            echo "Uploaded: $NAME"
          }

          # Upload platform tarballs
          for TARBALL in artifacts/proof-*/proof-*.tar.gz; do
            [ -f "$TARBALL" ] && upload_asset "$TARBALL"
          done

          # Upload wheel
          for WHEEL in artifacts/wheel/*.whl; do
            [ -f "$WHEEL" ] && upload_asset "$WHEEL"
          done

          echo "All assets uploaded."
