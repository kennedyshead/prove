name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e "prove-py[dev]" -q --break-system-packages

      - name: Run full test suite
        run: |
          cd prove-py && python -m pytest tests/ -v --tb=short
          ruff check prove-py/src/
          ruff check prove-py/tests/
          mypy prove-py/src/

      - name: Run e2e tests
        run: python scripts/test_e2e.py

      - name: Build proof project
        run: prove build proof/

      - name: Create GitHub release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          
          curl -s -X POST \
            -H "Authorization: token $GITEA_TOKEN" \
            -H "Content-Type: application/json" \
            "${{ gitea.server_url }}/api/v1/repos/${{ gitea.repository }}/releases" \
            -d "{
              \"tag_name\": \"$TAG\",
              \"name\": \"Prove $VERSION\",
              \"body\": \"Release $VERSION\"
            }"
