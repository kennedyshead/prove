name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: prove-py
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: prove-py/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]" -q --break-system-packages

      - name: Run full test suite
        run: |
          python -m pytest tests/ -v --tb=short
          ruff check src/ tests/
          mypy src/

      - name: Run e2e tests
        run: python ../scripts/test_e2e.py

      - name: Build proof project
        run: prove build ../proof/

      - name: Create Gitea release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          OWNER_REPO="${GITHUB_REPOSITORY:-Botwork/prove}"

          curl -s -X POST \
            -H "Authorization: token $GITEA_TOKEN" \
            -H "Content-Type: application/json" \
            "${{ gitea.server_url }}/api/v1/repos/$OWNER_REPO/releases" \
            -d "{
              \"tag_name\": \"$TAG\",
              \"name\": \"Prove $VERSION\",
              \"body\": \"Release $VERSION\"
            }"
