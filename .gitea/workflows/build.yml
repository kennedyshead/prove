name: Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prove-py
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config
          git clone --depth 1 --branch v0.25.4 https://github.com/tree-sitter/tree-sitter.git /tmp/tree-sitter
          cd /tmp/tree-sitter
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Create venv and install
        run: |
          python3 -m venv ../.venv
          source ../.venv/bin/activate
          pip install -e ".[dev,nlp]" build -q
          pip install ../tree-sitter-prove -q
          python -m spacy download en_core_web_lg -q
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Build all
        run: |
          # Proof binary
          python -c "from prove.builder import build_project; from prove.config import load_config; from pathlib import Path; p=Path('../proof'); build_project(p, load_config(p/'prove.toml'))" &
          PROOF_PID=$!

          # Python wheel
          python -m build --wheel --outdir ../build/wheel . &
          WHEEL_PID=$!

          # NLP stores
          (python ../scripts/ml_extract.py && python ../scripts/ml_train.py && python scripts/build_stores.py) &
          NLP_PID=$!

          FAIL=0
          wait $PROOF_PID || { echo "Failed: proof binary";  FAIL=1; }
          wait $WHEEL_PID || { echo "Failed: python wheel";  FAIL=1; }
          wait $NLP_PID   || { echo "Failed: NLP stores";    FAIL=1; }
          exit $FAIL
