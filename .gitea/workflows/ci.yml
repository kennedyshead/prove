name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prove-py
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: prove-py/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]" -q --break-system-packages

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run ruff linter
        run: ruff check src/ tests/

      - name: Run mypy
        run: mypy src/

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prove-py
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: prove-py/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]" -q --break-system-packages

      - name: Run e2e tests
        run: python ../scripts/test_e2e.py
