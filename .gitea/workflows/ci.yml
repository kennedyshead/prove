name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prove-py
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create venv and install
        run: |
          python3 -m venv ../.venv
          source ../.venv/bin/activate
          pip install -e ".[dev]" -q
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Run all checks
        run: |
          ruff check src/ tests/ &
          RUFF_PID=$!
          mypy src/ &
          MYPY_PID=$!
          python -m pytest tests/ -v --tb=short -n auto &
          PYTEST_PID=$!
          python ../scripts/test_e2e.py &
          E2E_PID=$!
          FAIL=0
          wait $RUFF_PID   || { echo "ruff failed";   FAIL=1; }
          wait $MYPY_PID   || { echo "mypy failed";   FAIL=1; }
          wait $PYTEST_PID || { echo "pytest failed";  FAIL=1; }
          wait $E2E_PID    || { echo "e2e failed";     FAIL=1; }
          exit $FAIL
