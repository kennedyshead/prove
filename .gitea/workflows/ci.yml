name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prove-py
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create venv and install
        run: |
          python3 -m venv ../.venv
          source ../.venv/bin/activate
          pip install -e ".[dev]" -q
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Build proof binary
        run: python -c "from prove.builder import build_project; from prove.config import load_config; from pathlib import Path; p=Path('../proof'); build_project(p, load_config(p/'prove.toml'))"

      - name: Validate grammar
        run: |
          npm install -g tree-sitter-cli
          cd ../tree-sitter-prove
          tree-sitter generate
          tree-sitter test
          cd ../prove-py
          python -c "
          from prove.export import read_canonical_lists, validate_treesitter
          from pathlib import Path
          lists = read_canonical_lists()
          ok = validate_treesitter(lists, Path('..'))
          raise SystemExit(0 if ok else 1)
          "
          python ../tree-sitter-prove/scripts/extract_constants.py
          cd ../tree-sitter-prove
          git diff --exit-code constants/ || { echo 'constants/ out of date — run: tree-sitter generate && python scripts/extract_constants.py'; exit 1; }

      - name: Run all checks
        run: |
          ruff check src/ tests/ &
          RUFF_PID=$!
          mypy src/ &
          MYPY_PID=$!
          python -m pytest tests/ -v --tb=short -n auto &
          PYTEST_PID=$!
          python ../scripts/test_e2e.py &
          E2E_PID=$!
          FAIL=0
          wait $RUFF_PID   || { echo "ruff failed";   FAIL=1; }
          wait $MYPY_PID   || { echo "mypy failed";   FAIL=1; }
          wait $PYTEST_PID || { echo "pytest failed";  FAIL=1; }
          wait $E2E_PID    || { echo "e2e failed";     FAIL=1; }
          exit $FAIL
