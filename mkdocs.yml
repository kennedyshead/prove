site_name: Prove
site_description: An intent-first programming language designed to mitigate AI slop and code scraping
site_url: https://prove.botwork.se
site_author: Magnus Knutas
copyright: Copyright © 2026 Magnus Knutas

nav:
  - Home: index.md
  - Language:
      - Syntax: syntax.md
      - Functions & Verbs: functions.md
      - Type System: types.md
      - Contracts & Annotations: contracts.md
  - Standard Library:
      - Overview: stdlib/index.md
      - Character & Text: stdlib/character-text.md
      - Table, List & Store: stdlib/table-list-store.md
      - InputOutput & Path: stdlib/io-path.md
      - Parse, Format & Pattern: stdlib/parse-format-pattern.md
      - Math & Types: stdlib/math-types.md
      - Error & Log: stdlib/error-log.md
      - Time & Random: stdlib/time-random.md
      - Bytes & Hash: stdlib/bytes-hash.md
  - Compiler:
      - CLI Reference: cli.md
      - Compiler Features: compiler.md
      - Diagnostic Codes: diagnostics.md
  - AI Resistance: ai-resistance.md
  - Examples:
      - Inventory Service: examples/inventory_service.md
  - Project:
      - Design Decisions: design.md
      - Roadmap: roadmap.md
  - Blog:
      - What Happens When AI Can't Generate Your Code: blog/2026-03-11-what-happens-when-ai-cant-generate-your-code.md
      - Why I Built My Own Programming Language: blog/2026-03-04-why-i-built-my-own-programming-language.md

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.integrate
    - navigation.path
    - navigation.instant
    - search.suggest
    - search.highlight
  logo: assets/icon.png
  favicon: assets/icon.png
  icon:
    repo: fontawesome/brands/git-alt

repo_url: https://code.botwork.se/Botwork/prove
repo_name: Botwork/prove

extra_css:
  - stylesheets/extra.css

extra:
  analytics:
    provider: google
    property: G-NKZR66LXVT

markdown_extensions:
  - footnotes
  - pymdownx.mark
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
  - meta:
  - attr_list

plugins:
  - search:
      lang: en
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
      cache_safe: true

hooks:
  - docs/hooks/copy_well_known.py
