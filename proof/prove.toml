[package]
name = "proof"
version = "0.1.0"
authors = []
license = ""

[build]
target = "native"
mutate = true 
debug = false
ccache = true
c_sources = ["src/python/py_wrappers.c"]
c_flags = [
    "-I/opt/homebrew/opt/python@3.13/Frameworks/Python.framework/Versions/3.13/include/python3.13",
    "-DPYTHON_HOME=\"/opt/homebrew/opt/python@3.13/Frameworks/Python.framework/Versions/3.13\"",
]
link_flags = ["-L/opt/homebrew/opt/python@3.13/Frameworks/Python.framework/Versions/3.13/lib/python3.13/config-3.13-darwin", "-L/opt/homebrew/lib", "-lpython3.13", "-lintl", "-ldl", "-framework", "CoreFoundation"]

[optimize]
enabled = true
pgo = true
strip = true
tune_host = true
gc_sections = true

[test]
property_rounds = 1000

[style]
line_length = 90
