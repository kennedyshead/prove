# Canonical keyword definitions for the Prove language.
#
# This is the SINGLE SOURCE OF TRUTH for all keyword lists used by:
#   - tree-sitter-prove/grammar.js  (verify manually or via CI)
#   - chroma-lexer-prove/           (auto-synced)
#   - pygments-prove/               (auto-synced)
#
# After editing, run:  python scripts/sync_lexers.py

[verbs]
description = "Function declaration keywords (verb + async_verb in grammar.js)"
words = [
    "attached",
    "creates",
    "derives",
    "detached",
    "dispatches",
    "inputs",
    "listens",
    "matches",
    "outputs",
    "reads",
    "renders",
    "streams",
    "transforms",
    "validates",
]

[contract-keywords]
description = "Contract and annotation keywords"
words = [
    "ensures",
    "explain",
    "requires",
    "terminates",
    "trusted",
    "when",
]

